<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - tapas & foram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .invitation-card {
            background: white;
            max-width: 600px;
            width: 100%;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            padding: 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.1) 10px,
                rgba(255,255,255,0.1) 20px
            );
            animation: sparkle 3s linear infinite;
        }

        @keyframes sparkle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .header-subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            position: relative;
            z-index: 2;
        }

        .couple-photo {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 0 0 25px 25px;
        }

        .card-content {
            padding: 40px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border-radius: 2px;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background: white;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .detail-item:hover {
            transform: translateY(-5px);
        }

        .detail-icon {
            font-size: 2em;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .detail-value {
            font-size: 1.1em;
            font-weight: 500;
            color: #333;
        }

        .map-container {
            height: 300px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .rsvp-section {
            text-align: center;
            padding: 30px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border-radius: 15px;
            margin-top: 20px;
        }

        .rsvp-btn {
            background: white;
            color: #ff6b6b;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .rsvp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
            
            .header-title {
                font-size: 2em;
            }
            
            .card-content {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="invitation-card">
        <!-- Header -->
        <div class="card-header">
            <h1 class="header-title">You're Invited!</h1>
            <p class="header-subtitle">tapas & foram</p>
        </div>

        <!-- Couple Photo -->
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=600&h=300&fit=crop" 
             alt="John & Sarah" class="couple-photo" id="couplePhoto">

        <!-- Content -->
        <div class="card-content">
            <div class="section">
                <h2 class="section-title">Our Love Story</h2>
                <div class="video-container">
                    <video poster="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600&h=250&fit=crop" 
                           muted loop playsinline>
                        <source src="https://assets.mixkit.co/videos/preview/mixkit-wedding-rings-on-a-table-5214-large.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <div class="play-button" onclick="playVideo()">▶</div>
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <div class="detail-icon">📅</div>
                    <div class="detail-value">
                        <strong>December 25, 2024</strong><br>
                        <span style="font-size: 0.9em; opacity: 0.8;">Saturday, 6:00 PM</span>
                    </div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">📍</div>
                    <div class="detail-value">
                        <strong>Grand Palace Hotel</strong><br>
                        <span style="font-size: 0.9em; opacity: 0.8;">123 Wedding St, City</span>
                    </div>
                </div>
            </div>

            <!-- Google Maps -->
            <div class="section">
                <h2 class="section-title">Venue Location</h2>
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.566614745845!2d-73.98731968459137!3d40.75889697932685!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c259a9b311746f%3A0xd134e199a405a163!2sThe%20Plaza%20Hotel!5e0!3m2!1sen!2sus!4v1630000000000" 
                    class="map-container" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>

            <!-- RSVP -->
            <div class="rsvp-section">
                <h3 style="margin-bottom: 10px;">Will you join us?</h3>
                <p style="margin-bottom: 20px; opacity: 0.9;">We can't wait to celebrate with you!</p>
                <button class="rsvp-btn" onclick="rsvp()">RSVP Now</button>
            </div>
        </div>
    </div>

    <script>
        function playVideo() {
            const video = document.querySelector('video');
            const playBtn = document.querySelector('.play-button');
            
            video.play();
            playBtn.style.display = 'none';
        }

        function rsvp() {
            alert('Thank you for your RSVP! 🎉\nWe look forward to seeing you at the celebration!');
        }

        // Auto-play video on hover for better UX
        document.querySelector('.video-container').addEventListener('mouseenter', () => {
            const video = document.querySelector('video');
            video.play();
        });
    </script>
</body>
</html>
