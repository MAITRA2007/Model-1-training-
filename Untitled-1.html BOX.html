<!DOCTYPE html>
<html>
<head>
    <title>CSS Transform Animation</title>

    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: lightgray;
        }

        .box{
            width: 150px;
            height: 150px;
            background-color: royalblue;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 20px;
            font-weight: bold;

            animation: moveBox 10s infinite;
        }

        @keyframes moveBox{

            0%{
                transform: translateX(0px) rotate(0deg) scale(1);
            }

            10%{
                transform: translateX(150px) rotate(90deg) scale(1.2);
            }

            50%{
                transform: translateY(150px) rotate(180deg) scale(1);
            }

            75%{
                transform: translateX(-150px) rotate(270deg) scale(1.2);
            }

            100%{
                transform: translateX(0px) rotate(360deg) scale(1);
            }
        }

    </style>
</head>

<body>

    <div class="box">
        TRAINING
    </div>

</body>
</html>
